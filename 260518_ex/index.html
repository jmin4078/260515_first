<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- [1. SEO 메타데이터 실습] -->
    <title>제민기(Je Min-gi)의 포트폴리오</title>
    <meta name="description" content="백엔드 개발자를 꿈꾸는 제민기의 포트폴리오입니다.">

    <!-- [2. 오픈그래프 미리보기 실습] -->
    <meta property="og:title" content="제민기의 포트폴리오">
    <meta property="og:description" content="백엔드를 배우고 있는 제민기의 웹사이트입니다.">
    <!-- 
        [og:image 실습 가이드]
        - 링크 공유 시 나타날 카드 뉴스의 대표 이미지 주소(웹 절대경로)입니다.
        - 프리뷰 이미지 확보 방법:
          1) 무료 고화질 사이트인 Unsplash(https://unsplash.com/ko)에서 알맞은 이미지를 무료 다운로드
          2) 또는 완성된 본인 사이트를 단축키로 직접 캡처 (Mac: Cmd + Shift + 5 / Windows: Win + Shift + S)
          * 획득한 이미지 파일을 프로젝트 폴더 내에 함께 업로드하고, 그 이미지의 인터넷 절대경로를 아래 content에 기입합니다.
    -->
    <meta property="og:image" content="https://james.github.io/portfolio/assets/thumbnail.png">

    <!-- [3. 파비콘 연동 실습] -->
    <!-- 
        [Favicon 실습 가이드]
        - 브라우저 탭 이름 왼쪽에 표시되는 사이트 대표 아이콘입니다.
        - 파비콘 파일 생성 및 자세한 코드 세트 연동법은 아래 교안을 정독하여 실습을 완료하십시오:
          * 교안 위치: [교안/자료/1_프런트엔드/113-정적+웹+배포.md]의 'Favicon' 영역 참고
          * (Google AI Studio 또는 Arena AI로 정방형 로고 생성 -> RealFaviconGenerator.net 변환 후 저장소에 파일 업로드)
    -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- [4. 웹폰트 실습 및 단순 스타일] -->
    <style>
        /* [웹폰트 다변화 실습] 
           - 제목, 내용, 강조 텍스트에 각각 어울리는 상이한 웹폰트를 실시간 로드해 매칭합니다.
        */

        /* 1) 제목용: 페이퍼로지 (Paperlogy) */
        @import url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css');

        /* 2) 내용용: 프리텐다드 (Pretendard) */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        /* 3) 강조용: 샌드박스 어그로체 (SBAggroB) */
        @font-face {
            font-family: 'SBAggroB';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #334155;
            box-sizing: border-box;
        }

        .portfolio-card {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 48px 40px;
            text-align: center;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        .portfolio-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        }

        .profile-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #eff6ff;
            margin-bottom: 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            background-color: #f1f5f9;
        }

        h1 {
            font-family: 'Paperlogy', sans-serif;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .intro-text {
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 32px;
            color: #64748b;
        }

        strong, .highlight {
            font-family: 'SBAggroB', sans-serif;
            color: #3b82f6;
            font-weight: normal;
        }

        .info-section {
            background-color: #f8fafc;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        .info-section h2 {
            font-family: 'Paperlogy', sans-serif;
            color: #1e293b;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: 600;
            color: #64748b;
            width: 70px;
            flex-shrink: 0;
        }

        .info-value {
            color: #334155;
            font-weight: 500;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.25);
            font-family: 'Pretendard', sans-serif;
            width: 100%;
            box-sizing: border-box;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.35);
        }
    </style>
</head>

<body>
    <div class="portfolio-card">
        <img src="https://picsum.photos/400/400" alt="제민기의 프로필 이미지" class="profile-img" title="포트폴리오 프로필">
        
        <h1>안녕하세요! 제민기입니다.</h1>
        <p class="intro-text">
            저는 현재 <strong>백엔드를 집중적으로 배우는 중</strong>이며,<br>
            안정적이고 확장 가능한 서버 아키텍처 구축에 관심이 많습니다.
        </p>

        <div class="info-section">
            <h2>프로필 정보</h2>
            <div class="info-item">
                <span class="info-label">이름</span>
                <span class="info-value">제민기</span>
            </div>
            <div class="info-item">
                <span class="info-label">상태</span>
                <span class="info-value highlight">백엔드 학습 중 (구직 준비)</span>
            </div>
            <div class="info-item">
                <span class="info-label">이메일</span>
                <span class="info-value">jmkk9345@naver.com</span>
            </div>
        </div>

        <a href="mailto:jmkk9345@naver.com" class="contact-btn">이메일 보내기</a>
    </div>
</body>

</html>



</html>
