<!-- 
    [CSS 적용 방법 및 우선순위 실습]
    - 태그 선택자(h1, h2, p)만 사용하여 가장 단순한 문단 구조로 실습합니다.
    1. 인라인 스타일: 태그에 직접 작성 (우선순위 가장 높음)
    2. 내부 스타일 시트: head 내 style 태그로 작성
    3. 외부 스타일 시트: link로 연결된 외부 CSS 파일로 작성
-->
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 적용 방식 실습</title>

    <!-- [3. 외부 스타일 시트 연결] -->
    <link rel="stylesheet" href="style.css">

    <!-- [2. 내부 스타일 시트 적용] -->
    <style>
        /* 외부 스타일(p: 초록색)보다 나중에 정의되어 덮어쓰므로 '파란색'이 됩니다. */
        p {
            color: blue;
        }
    </style>
</head>

<body>
    <!-- [1. 인라인 스타일] 인라인 스타일은 항상 가장 강력하게 덮어씁니다. -->
    <h1 style="color: red;">인라인 스타일 제목 (빨간색)</h1>

    <!-- 내부 스타일에 정의가 없으므로 외부 스타일(보라색)이 그대로 반영됩니다. -->
    <h2>외부 스타일 제목 (보라색)</h2>

    <!-- 외부 스타일(초록색)과 내부 스타일(파란색)이 충돌하여, 더 나중에 작성된 내부 스타일이 적용됩니다. -->
    <p>이 문단은 외부 스타일과 내부 스타일이 충돌하지만, 더 나중에 선언된 내부 스타일(파란색)이 적용됩니다.</p>

    <!-- 외부/내부 스타일(초록/파랑)이 정의되어 있지만, 태그에 직접 지정한 인라인 스타일이 이깁니다. -->
    <p style="color: red;">이 문단은 외부와 내부 스타일을 무시하고 태그에 직접 지정한 인라인 스타일(빨간색)이 적용됩니다.</p>
</body>

</html>
