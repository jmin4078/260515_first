<!-- 1. 문서 타입 선언: 이 문서가 HTML5 표준임을 브라우저에 알림 -->
<!DOCTYPE html>
<!-- 2. html 태그: 전체 문서를 감싸는 최상위 요소 (언어 설정 포함) -->
<html lang="ko">

<!-- 3. head 태그: 문서의 정보(메타데이터)를 담는 영역 (화면엔 안 보임) -->
<head>
    <!-- 
        인코딩 설정: 문서의 문자를 어떻게 표현할지 결정
        - UTF-8: 전 세계 모든 언어를 지원하는 국제 표준 (권장)
        - EUC-KR: 한국어 위주의 과거 표준 방식 (한글 외 다른 언어 사용 시 깨질 수 있음)
    -->
    <meta charset="UTF-8">
    <!-- 뷰포트 설정: 모바일 등 다양한 기기 화면에 맞게 조절 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 브라우저 상단 탭에 표시되는 제목 -->
    <title>나의 첫 HTML</title>
</head>

<!-- 4. body 태그: 실제 브라우저 화면에 그려지는 컨텐츠 영역 -->
<body>
    <!-- 제목 태그: 가장 큰 대제목 (h1 ~ h6 중 h1) -->
    <h1>안녕하세요, HTML!</h1>
    <!-- 단락 태그: 본문 내용을 담는 영역 -->
    <p>이것은 저의 첫 번째 HTML 문서입니다. 태그를 사용하여 웹 페이지의 구조를 만들어 보았습니다.</p>
</body>

</html>
