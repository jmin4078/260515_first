<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주요 HTML 태그 실습</title>
  </head>

  <body>
    <!-- h1: 페이지에서 가장 중요한 제목 (주로 한 번만 사용) -->
    <h1>주요 HTML 태그 활용하기</h1>
    <!-- strong: 텍스트의 의미를 강조할 때 사용 (브라우저에서 굵게 표시됨) -->
    <p>
      이 페이지에서는 웹 개발에 필수적인 <strong>주요 태그</strong>들을
      실습합니다.
    </p>

    <!-- h2: h1 다음으로 중요한 소제목 -->
    <h2>내가 좋아하는 음식 목록</h2>
    <!-- ul: 순서가 없는 목록 (Unordered List) -->
    <ul>
      <!-- li: 목록의 각 항목 (List Item) -->
      <li>마라탕 (푸주 많이!)</li>
      <li>아이스 아메리카노</li>
      <li>초밥</li>
    </ul>
    <ol>
      <li>수영</li>
      <li>수업</li>
    </ol>

    <h2>유용한 링크 및 미디어</h2>
    <!-- a 태그의 부수 속성: target(대상 윈도우/탭), title(마우스 오버 설명) -->
    <!-- 
        target 속성 주요 옵션:
        - _self: 현재 탭에서 열기 (기본값)
        - _blank: 새 탭에서 열기
    -->

    <h3>즐겨찾기</h3>
    구독 <br />

    <hr />
    <strong><em>즐겨찾기</em></strong>
    <p>
      더 많은 정보를 원하시면
      <a href="https://google.com" target="_blank" title="구글 홈페이지로 이동"
        >구글</a
      >을 방문해 보세요.
    </p>

    <!-- 
        Lorem Picsum (picsum.photos): 
        실무형 랜덤 이미지를 제공하는 서비스입니다. 
        뒤의 숫자(400/200)를 조절하여 원하는 크기의 이미지를 가져올 수 있습니다.
    -->
    <!-- img 태그의 부수 속성: alt(대체 텍스트), title(이미지 설명) -->
    <img
      src="https://picsum.photos/400/200"
      alt="랜덤 실습 이미지"
      title="랜덤하게 생성된 연습용 이미지입니다."
    />
  </body>
</html>
