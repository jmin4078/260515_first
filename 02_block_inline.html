<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Inline</title>
    <style>
      div {
        background-color: salmon;
        width: 150px;
        height: 50px;
        margin: 15px;
        padding: 15px;
        /* display: block; */
      }
      span {
        /* display: inline; */
        background-color: greenyellow;
        width: 150px;
        height: 50px;
        margin: 15px;
        padding: 15px;
      }
    </style>
  </head>
  <body>
    <div>b1</div>
    <div>b2</div>
    <span>i1</span>
    <span>i2</span>
    <div class="inline">a1</div>
    <span class="block">a2</span>
  </body>
</html>
